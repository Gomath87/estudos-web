<!--Exercício 2: Formatação de Texto e Hierarquia
A Engenharia de Software preza por semântica. Crie uma página que simule um pequeno artigo técnico:
Use um <h2> para o título do artigo: "O que é HTML?".
Escreva um parágrafo (<p>) explicando brevemente o HTML.
Use as tags de ênfase: deixe uma palavra em negrito (<strong>) e outra em itálico (<em>).-->


<!DOCTIPE html> <html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Definição HTML</title>
    </head>

    <body>
        <h2>O que é HTML?</h2>
        <p>HTML (<strong> Markup Language</strong> — Linguagem de Marcação de Hipertexto) é a linguagem padrão utilizada para <em>criar e estruturar páginas web.</em> </p>
    </body>
